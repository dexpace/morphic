openapi: 3.1.0
info: {title: ParamStyles, version: "1.0.0"}
paths:
  /search:
    get:
      operationId: search
      parameters:
        - {name: q, in: query, schema: {type: string}}
        - name: filter
          in: query
          style: deepObject
          explode: true
          schema: {type: object}
        - name: payload
          in: query
          content:
            application/json:
              schema: {type: object}
      responses:
        "200":
          description: ok
