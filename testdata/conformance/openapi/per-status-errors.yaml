openapi: 3.1.0
info: {title: PerStatusErrors, version: "1.0.0"}
paths:
  /widgets:
    get:
      operationId: getWidgets
      responses:
        "200":
          description: ok
        "404":
          description: not found
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Err'}
        "5XX":
          description: server error
        default:
          description: fallback
components:
  schemas:
    Err:
      type: object
      properties:
        message: {type: string}
