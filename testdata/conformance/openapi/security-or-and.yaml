openapi: 3.1.0
info: {title: SecurityOrAnd, version: "1.0.0"}
security:
  - apiKeyAuth: []
  - basicAuth: []
    bearerAuth: []
  - {}
paths:
  /public:
    get:
      operationId: publicOp
      security: []
      responses:
        "200":
          description: ok
components:
  securitySchemes:
    apiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
    basicAuth:
      type: http
      scheme: basic
    bearerAuth:
      type: http
      scheme: bearer
