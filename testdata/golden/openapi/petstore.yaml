openapi: 3.1.0
info:
  title: Petstore
  version: "1.0.0"
  termsOfService: https://example.com/terms
  contact: {name: API Team, email: api@example.com}
  license: {name: MIT}
servers:
  - url: https://{env}.example.com/v1
    description: Primary server
    variables:
      env:
        default: api
        enum: [api, staging]
        description: Deployment environment
security:
  - petstore_auth: [read:pets]
tags:
  - {name: pets, description: Pet operations}
paths:
  /pets:
    get:
      operationId: listPets
      tags: [pets]
      parameters:
        - {name: limit, in: query, schema: {type: integer}}
      responses:
        "200":
          description: A list of pets
          content:
            application/json:
              schema: {type: array, items: {$ref: "#/components/schemas/Pet"}}
        default:
          description: Unexpected error
          content:
            application/json:
              schema: {$ref: "#/components/schemas/Error"}
    post:
      operationId: createPet
      tags: [pets]
      security:
        - {}
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: "#/components/schemas/Pet"}
      responses:
        "200":
          description: Created
          content:
            application/json:
              schema: {$ref: "#/components/schemas/Pet"}
        "404":
          description: Not found
          content:
            application/json:
              schema: {$ref: "#/components/schemas/Error"}
  /pets/{petId}:
    get:
      operationId: getPet
      tags: [pets]
      parameters:
        - {name: petId, in: path, required: true, schema: {type: string}}
      responses:
        "200":
          description: A pet
          content:
            application/json:
              schema: {$ref: "#/components/schemas/Pet"}
components:
  securitySchemes:
    petstore_auth:
      type: oauth2
      flows:
        implicit:
          authorizationUrl: https://example.com/auth
          scopes: {"read:pets": read your pets}
  schemas:
    Pet:
      type: object
      required: [id, name]
      properties:
        id: {type: integer}
        name: {type: string}
        category: {$ref: "#/components/schemas/Category"}
        status:
          oneOf:
            - {type: string}
            - {type: integer}
        meta:
          type: object
          properties:
            tag: {type: string}
    Category:
      type: object
      properties:
        name: {type: string}
    Error:
      type: object
      properties:
        code: {type: integer}
        message: {type: string}
